base_model: pretrained_models/Spark-TTS-0.5B/LLM
# Automatically upload checkpoint and final model to HF
# hub_model_id: username/custom_model_name

trust_remote_code: true

strict: false

datasets:
  - path: /home/app/translate-topic/quangdm9/experiment/Spark-TTS-finetune/output_prompts_train/train.jsonl
    type: completion
    
dataset_prepared_path:
val_set_size: 0.05
output_dir: ./outputs_vietmuong/out


sequence_len: 256
sample_packing: true
eval_sample_packing: false
pad_to_sequence_len: true

wandb_project: sparktts
wandb_name: vietmuong-full
wandb_watch: "false"
wandb_log_model: "end"

gradient_accumulation_steps: 4
micro_batch_size: 4
num_epochs: 50
optimizer: adamw_torch_fused
lr_scheduler: cosine
learning_rate: 0.0002

train_on_inputs: false
group_by_length: false
bf16: auto
fp16:
tf32: true

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
early_stopping_patience:
resume_from_checkpoint:
local_rank:
logging_steps: 50
xformers_attention:
flash_attention: true

warmup_steps: 10
evals_per_epoch: 1
save_steps: 10000
debug:
deepspeed:
weight_decay: 0.0
